name: Gemini PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  pull-requests: write
  contents: read

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: pip install google-genai

      - name: Gemini Code Review
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO_URL: ${{ github.repository }}
        run: |
          cat << 'EOF' > review.py
          import os
          import subprocess
          import sys
          from google import genai
          
          pr_number = os.environ.get("PR_NUMBER")
          repo_url = os.environ.get("REPO_URL")
          gh_token = os.environ.get("GITHUB_TOKEN")
          gemini_key = os.environ.get("GEMINI_API_KEY")
          
          if not gemini_key:
              print("GEMINI_API_KEY secret is not set. Skipping review.")
              sys.exit(0)
              
          try:
              diff_result = subprocess.run(
                  ["gh", "pr", "diff", pr_number, "--repo", repo_url],
                  capture_output=True,
                  text=True,
                  check=True,
                  env={**os.environ, "GH_TOKEN": gh_token}
              )
              pr_diff = diff_result.stdout
          except subprocess.CalledProcessError as e:
              print(f"Failed to fetch PR diff: {e.stderr}")
              sys.exit(1)
              
          if not pr_diff.strip():
              print("No diff found. Exiting.")
              sys.exit(0)
              
          try:
              client = genai.Client(api_key=gemini_key)
              prompt = f"""You are an expert software engineer reviewing a pull request.
          Please review the following git diff and provide constructive, concise feedback.
          Focus on bugs, performance issues, security vulnerabilities, and code readability.
          Use markdown formatting. If the code looks great, just say so.
          
          Here is the diff:
          ```diff
          {pr_diff[:30000]}
          ```
          """
              response = client.models.generate_content(
                  model="gemini-2.5-flash",
                  contents=prompt
              )
              review_comment = response.text
          except Exception as e:
              print(f"Failed to call Gemini API: {e}")
              sys.exit(1)
              
          try:
              with open("review.md", "w", encoding="utf-8") as f:
                  f.write("### 🤖 Gemini PR Review\n\n" + review_comment)
                  
              subprocess.run(
                  ["gh", "pr", "comment", pr_number, "--repo", repo_url, "-F", "review.md"],
                  check=True,
                  env={**os.environ, "GH_TOKEN": gh_token}
              )
              print("Successfully posted Gemini review.")
          except subprocess.CalledProcessError as e:
              print(f"Failed to post comment: {e.stderr}")
              sys.exit(1)
          EOF
          
          python review.py
